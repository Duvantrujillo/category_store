services:
  db:
    image: mysql:8.0
    container_name: mysql-8
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: category_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend-api
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    environment:
      DATABASE_URL: "mysql://root:123456@db:3306/category_db"
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: frontend-app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  db_data:
